name: CI - API Tests (ReqRes)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run ReqRes API tests
        run: npm run test:reqres
        env:
          CI: true
          LOG_LEVEL: warn

      - name: Run Mock scenario tests
        run: npm run test:mocks
        env:
          CI: true
          LOG_LEVEL: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-results
          path: |
            reports/
            test-results/
          retention-days: 14